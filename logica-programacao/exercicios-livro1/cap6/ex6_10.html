<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Ex6.10</title>
</head>
<body>
    <h1>Programa Caixa de Loja</h1>
    <p>Data de Vencimento:
        <input type="date" id="inDataVenc" autofocus required>
    </p>
    <p>Valor da Conta R$: 
        <input type="number" id="inValor" step="0.00" min="0" class="aDireita" required>
        <input type="button" id="btCalcular" value="Calcular Multa e Juros">
    </p>
    <p>Valor da Multa R$: 
        <input type="text" id="outMulta" class="aDireita" readonly>
    </p>
    <p>Valor do Juros R$: 
        <input type="text" id="outJuros" class="aDireita" readonly>
    </p>
    <p>Total a Pagar R$: 
        <input type="text" id="outTotal" class="aDireita" readonly>
        <input type="button" id="btNovaConta" value="Nova Conta">
    </p>
    <script src="js/ex6_10.js"></script>
</body>
</html>
