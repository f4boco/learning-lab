<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex6.1</title>
</head>
<body>
    <script>
        const anuncio = prompt("Anuncio: "); // lê o anúncio
        const tam = anuncio.length; // obtém o tamanho do anúncio
        let numPalavras = 0; // inicializa o contador

        // percorre os caracteres do anúncio
        for (let i = 0; i < tam; i++) {
            if (anuncio.charAt(i) == " ") { // se encontrou um espaço vazio
                numPalavras++; // incrementa contador
            }
        }

        // exibe o anúncio e o nº de palavras (que é o nº de espaços + 1)
        alert("Anúncio: " + anuncio + "\nNº Palavras: " + (numPalavras + 1));
    </script>
</body>
</html>
