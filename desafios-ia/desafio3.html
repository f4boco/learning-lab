<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Desafio 3</title>
</head>

<body>
    <header class="cabecalho">
        <h1>Filtro de Produtos</h1>
        <small>Desafio 3 - IA</small>
    </header>

    <div class="conteiner-conteudo">
        <main class="main-simples">
            <section id="filtro">
                <details>
                    <summary>Filtrar</summary>
                    <form id="formulario-filtro">
                        <label for="inCategoria">Selecionar Categoria</label>
                        <select name="categoria" id="inCategoria">
                            <option value="todas" selected>Todas</option>
                            <option value="Consumer Electronics">Consumer Electronics</option>
                            <option value="Smart Home">Smart Home</option>
                            <option value="Periféricos e Hardware de Computação">Periféricos e Hardware de Computação</option>
                            <option value="Networking e Infraestrutura">Networking e Infraestrutura</option>
                            <option value="Componentes e Armazenamento de Dados">Componentes e Armazenamento de Dados</option>
                        </select>
                        <label for="inValorMinimo">Valor Mínimo: </label>
                        <input type="number" id="inValorMinimo" step="1.00" min="0">
                        <button type="submit">Filtrar Produtos</button>
                        <button type="button" id="btLimpar">CLS Filtro</button>
                    </form>
                </details>
            </section>
            <section id="outProdutos" class="secao-entradas">

            </section>
        </main>
    </div>

    <footer class="rodape">
        <small>Fabiano O. &copy; 2026</small>
    </footer>

    <script src="js/desafio3.js"></script>
</body>

</html>
