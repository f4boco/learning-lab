<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Desafio 8</title>
</head>
<body>
    <header class="cabecalho">
        <h1>Validador de Senhas Seguras</h1>
        <small>Desafio 008 - IA</small>
    </header>

    <div class="conteiner-conteudo">
        <main class="main-duplo">
            <section class="secao-entradas">
                <h2>[Entrada] - Senha</h2>
                <form id="formulario-senha">
                    <label for="inSenha">Senha:</label>
                    <input type="password" id="inSenha" required autofocus>
                    <button type="submit">Verificar Senha</button>
                </form>
            </section>

            <section class="secao-saida">
                <h2>[Saida] - Status Senha</h2>
                <pre id="outResultado"></pre>
            </section>
        </main>
    </div>

    <footer class="rodape">
        <p>by Fabino O.</p>
        <small>&copy; 2026</small>
    </footer>

    <script src="js/desafio8.js"></script>
</body>
</html>
