<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Desafio 11</title>
</head>
<body>
    <header class="cabecalho">
        <h1>Contador de Palavras Específicas</h1>
        <small>Desafio 011- IA</small>
    </header>

    <div class="conteiner-conteudo">
        <main class="main-duplo">
            <section class="secao-entradas">
                <h2>[Entrada] - Texto</h2>

                <form id="formulario-entradas">
                    <label for="inTexto">Texto:</label>
                    <textarea id="inTexto" placeholder="Cole/Digite o texto aqui" required autofocus></textarea>
                    <label for="inPalavra">Palavra P/Contar:</label>
                    <input type="text" id="inPalavra" required>
                    <button type="submit">Contar Palavra</button>
                </form>
            </section>

            <section class="secao-saida">
                <h2>[Saida] - Contagem da Plavra</h2>
                <pre id="outResultado"></pre>
            </section>
        </main>
    </div>

    <footer class="rodape">
        <p>by Fabiano O.</p>
        <small>&copy; 2026</small>
    </footer>

    <script src="js/desafio11.js"></script>
</body>
</html>
