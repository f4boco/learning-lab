<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Desafio 14</title>
</head>
<body>
    <header class="cabecalho">
        <h1>Conversor de Moedas do Estoque</h1>
        <small>Desafio 14 - IA</small>
    </header>
    
    <div class="conteiner-conteudo">
        <main class="main-simples">
            <section class="secao-filtros">
                <details>
                    <summary><strong>Filtro</strong></summary>
                    <form>
                        <label for="inValorMinimo">Valor Mínimo</label>
                        <input type="number" id="inValorMinimo" step="0.01" min="0" autofocus>
                        <label for="inValorMax">Valor Máximo</label>
                        <input type="number" id="inValorMax" step="0.01" min="0">
                        <button type="submit">Filtrar</button>
                        <button type="button">Limpar Filtro</button>
                    </form>
                </details>
            </section>

            <section class="secao-saida">
                <h2>[Saída] - Produtos com Valores Convertidos</h2>
                <p>A conversão considera um câmbio de R$ 5,50 por dolar</p>
                <section class="secao-produtos grade-cartoes" id="outProdutos">
                    
                </section>
            </section>
        </main>
    </div>
    <header class="rodape">
        <p>by Fabiano O.</p>
        <small>&copy; 2026</small>
    </header>
    <script src="js/desafio14.js"></script>
</body>
</html>
